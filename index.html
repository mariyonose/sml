
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSF Medical Link - Master Class</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-black: #0f0f0f;
            --brand-teal: #59d1a9;
            --brand-cyan: #22a3d2;
            --brand-sky: #75cae5;
            --brand-blue: #1b55a5;
            --brand-dark-teal: #20a0b9;
        }
        html, body {
            overflow-x: hidden;
        }
        body {
            font-family: 'Noto Sans JP', 'Inter', sans-serif;
            color: var(--brand-black);
            background-color: #ffffff;
            -webkit-font-smoothing: antialiased;
        }
        
        .font-serif {
            font-family: 'Playfair Display', serif;
        }

        .bg-brand-blue-tint { background-color: #f8fafc; }
        .bg-brand-gradient { 
            background: linear-gradient(135deg, var(--brand-blue) 0%, var(--brand-cyan) 50%, var(--brand-teal) 100%); 
        }
        .bg-brand-dark-gradient { 
            background: linear-gradient(135deg, #050c1a 0%, var(--brand-blue) 100%); 
        }

        /* ブランドカラーユーティリティ */
        .text-brand-blue { color: var(--brand-blue); }
        .bg-brand-blue { background-color: var(--brand-blue); }
        .bg-brand-teal { background-color: var(--brand-teal); }
        
        .hover-lift { transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        .hover-lift:hover { transform: translateY(-10px); }

        .image-reveal {
            overflow: hidden;
        }
        .image-reveal img {
            transition: transform 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .image-reveal:hover img {
            transform: scale(1.05);
        }

        .treatment-card {
            border-bottom: 1px solid #eee;
            transition: all 0.4s ease;
        }
        .treatment-card:hover {
            border-bottom-color: var(--brand-blue);
            padding-left: 1rem;
        }

        .animate-ken-burns {
            animation: kenburns 10s linear infinite alternate;
        }
        @keyframes kenburns {
            from { transform: scale(1.0); }
            to { transform: scale(1.1); }
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react-router-dom": "https://esm.sh/react-router-dom@^7.13.0",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body class="bg-white">
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
